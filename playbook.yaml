- name: Install webserver and serve Hello World
  hosts: all
  become: true

  tasks:
    - name: Install nginx
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Create Hello World page
      ansible.builtin.copy:
        dest: /usr/share/nginx/html/index.html
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <title>Hello</title>
          </head>
          <body>
            <h1>Hello World</h1>
          </body>
          </html>
        owner: nginx
        group: nginx
        mode: '0644'

    - name: Enable and start nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
